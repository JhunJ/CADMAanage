<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>CAD Manage - 관리</title>
<style>
*{box-sizing:border-box}body{margin:0;font-family:"Segoe UI","Malgun Gothic",sans-serif;background:#f3f4f6;color:#111}
nav{display:flex;gap:14px;align-items:center;padding:10px 16px;background:#fff;border-bottom:1px solid #d0d7de}nav .brand{font-weight:700}nav a{color:#0969da;text-decoration:none}
main{max-width:980px;margin:0 auto;padding:16px}.card{background:#fff;border:1px solid #d0d7de;border-radius:8px;padding:14px;margin-bottom:12px}
.card h2{margin:0 0 10px 0;font-size:15px}.row{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end}.row>div{flex:1;min-width:170px}
label{display:block;font-size:12px;color:#374151;margin-bottom:4px}input,select{width:100%;height:32px;border:1px solid #d0d7de;border-radius:6px;padding:4px 8px}
button{height:32px;padding:0 10px;border:1px solid #1f883d;background:#1f883d;color:#fff;border-radius:6px;cursor:pointer;font-weight:600}button.alt{border-color:#d0d7de;background:#f6f8fa;color:#111}button.danger{border-color:#cf222e;background:#cf222e}
button:disabled{background:#94a3b8;border-color:#94a3b8;cursor:not-allowed}table{width:100%;border-collapse:collapse;margin-top:8px}th,td{border-bottom:1px solid #e5e7eb;padding:6px;font-size:12px;text-align:left}
th{background:#f9fafb}.msg{display:none;margin-top:8px;padding:7px 9px;border-radius:6px;font-size:12px}.msg.show{display:block}.ok{background:#dafbe1;color:#166534}.err{background:#ffebe9;color:#b91c1c}.info{background:#ddf4ff;color:#0c4a6e}
.hint{font-size:12px;color:#6b7280;margin-top:6px}.soft{margin-top:8px;padding:10px;border:1px solid #d0d7de;border-radius:8px;background:#f8fafc}
</style>
</head>
<body>
<nav><span class="brand">CAD Manage</span><a href="/">워크스페이스</a><a href="/manage">관리</a><a href="/docs">API 문서</a></nav>
<main>
<div class="card"><h2>등록자</h2>
<div class="row"><div><label>이름</label><input id="userName"></div><div><label>이메일</label><input id="userEmail" type="email"></div><div><label>역할/부서</label><input id="userRole"></div><div style="flex:0 0 auto"><button id="addUserBtn">추가</button></div><div style="flex:0 0 auto"><button id="refreshUsersBtn" class="alt">새로고침</button></div></div>
<table><thead><tr><th>ID</th><th>이름</th><th>이메일</th><th>역할</th><th>삭제</th></tr></thead><tbody id="userList"><tr><td colspan="5">불러오는 중...</td></tr></tbody></table>
<div id="userMsg" class="msg"></div></div>

<div class="card"><h2>프로젝트</h2>
<div class="row"><div><label>이름</label><input id="projName"></div><div><label>코드</label><input id="projCode"></div><div><label>등록자</label><select id="projCreatedBy"><option value="">선택</option></select></div><div style="flex:0 0 auto"><button id="addProjBtn">추가</button></div><div style="flex:0 0 auto"><button id="refreshProjBtn" class="alt">새로고침</button></div></div>
<table><thead><tr><th>ID</th><th>이름</th><th>코드</th><th>등록자</th><th>삭제</th></tr></thead><tbody id="projList"><tr><td colspan="5">불러오는 중...</td></tr></tbody></table>
<div id="projMsg" class="msg"></div></div>

<div class="card"><h2>버전 내용 수정/삭제 세션</h2>
<div class="row"><div><label>프로젝트</label><select id="verProjSel"><option value="">선택</option></select></div><div><label>버전(커밋)</label><select id="verCommitSel"><option value="">선택</option></select></div><div><label>편집자</label><select id="verUserSel"><option value="">선택</option></select></div></div>
<div class="row" style="margin-top:8px"><div style="flex:0 0 auto"><button id="verStartBtn">세션 시작</button></div><div style="flex:0 0 auto"><button id="verEndBtn" class="alt">세션 종료</button></div><div style="flex:0 0 auto"><button id="verRefreshBtn" class="alt">새로고침</button></div></div>
<div id="verStatus" class="hint">세션 없음</div>
<div id="verEditWrap" class="soft" style="display:none">
<div class="row"><div><label>버전 라벨</label><input id="verLabel"></div><div><label>브랜치</label><input id="verBranch"></div><div><label>담당자명</label><select id="verAssignee"><option value="">선택</option></select></div></div>
<div class="row" style="margin-top:6px"><div><label>담당부서/역할</label><select id="verDept"><option value="">선택</option></select></div><div><label>구조/건축</label><select id="verClassPre"><option value="">선택</option><option value="구조">구조</option><option value="건축">건축</option></select></div><div><label>대분류</label><select id="verClassMajor"><option value="">선택</option><option value="지하주차장">지하주차장</option><option value="아파트">아파트</option><option value="부대시설">부대시설</option><option value="단위세대">단위세대</option></select></div></div>
<div class="row" style="margin-top:6px"><div><label>중분류</label><select id="verClassMid"><option value="">선택</option><option value="평면">평면</option><option value="단면">단면</option><option value="일람">일람</option></select></div><div><label>소분류</label><select id="verClassMinor"><option value="">선택</option></select></div><div><label>공종</label><select id="verClassWork"><option value="">선택</option></select></div></div>
<div class="row" style="margin-top:6px"><div><label>변화이력</label><input id="verNotes"></div></div>
<div class="row" style="margin-top:8px"><div style="flex:0 0 auto"><button id="verSaveBtn">저장</button></div><div style="flex:0 0 auto"><button id="verDeleteBtn" class="danger">버전 삭제</button></div></div>
</div>
<div id="verMsg" class="msg"></div></div>

<div class="card"><h2>데이터 초기화</h2><p class="hint">등록자/프로젝트/버전/파일 등 DB 데이터를 모두 삭제합니다.</p><button id="resetAllBtn" class="danger">전체 초기화</button><div id="resetMsg" class="msg"></div></div>
</main>
<script>
const S={users:[],projects:[],commits:[],minorLabels:[],workTypeLabels:[],sess:{id:null,commitId:null,userId:null,timer:null}};
const CLASS_PRE_OPTIONS=['구조','건축'],CLASS_MAJOR_OPTIONS=['지하주차장','아파트','부대시설','단위세대'],CLASS_MID_OPTIONS=['평면','단면','일람'];
const gid=id=>document.getElementById(id),toInt=v=>{const n=parseInt(v||'',10);return Number.isFinite(n)?n:null;},txt=v=>String(v==null?'':v).trim();
const esc=v=>String(v==null?'':v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const uniq=arr=>Array.from(new Set((arr||[]).map(txt).filter(Boolean)));
const msg=(id,t,kind)=>{const e=gid(id);if(!e)return;e.textContent=t||'';e.className='msg show '+(kind==='error'?'err':kind==='success'?'ok':'info');if(kind==='success')setTimeout(()=>e.className='msg',2600);};
const j=async r=>{try{return await r.json()}catch(_){return {}}};
const err=(d,r,f)=>{if(d&&d.detail){if(typeof d.detail==='string')return d.detail;if(d.detail.message)return d.detail.message;try{return JSON.stringify(d.detail)}catch(_){}}return f||r.statusText||'요청 실패'};
function setOpts(sel,arr,prev){if(!sel)return;sel.innerHTML='<option value="">선택</option>'+arr.join('');if(prev!=null&&prev!==''){sel.value=String(prev);if(sel.value!==String(prev))sel.value='';}}
function ensureSelectOption(sel,value){if(!sel)return;const sv=txt(value);if(!sv)return;for(let i=0;i<sel.options.length;i++){if(String(sel.options[i].value)===sv){sel.value=sv;return;}}sel.insertAdjacentHTML('beforeend','<option value="'+esc(sv)+'">'+esc(sv)+'</option>');sel.value=sv;}
function setSelectFromValues(id,values,prev){const sel=gid(id);if(!sel)return;const labels=uniq(values);sel.innerHTML='<option value="">선택</option>'+labels.map(v=>'<option value="'+esc(v)+'">'+esc(v)+'</option>').join('');if(prev)ensureSelectOption(sel,prev);}
const commitVals=key=>(S.commits||[]).map(c=>(c&&c[key])||'');
function refreshVersionFieldOptions(){const prev={assignee:gid('verAssignee')?.value||'',dept:gid('verDept')?.value||'',pre:gid('verClassPre')?.value||'',major:gid('verClassMajor')?.value||'',mid:gid('verClassMid')?.value||'',minor:gid('verClassMinor')?.value||'',work:gid('verClassWork')?.value||''};setSelectFromValues('verAssignee',S.users.map(u=>u&&u.name).concat(commitVals('assignee_name')),prev.assignee);setSelectFromValues('verDept',S.users.map(u=>u&&u.role).concat(commitVals('assignee_department')),prev.dept);setSelectFromValues('verClassPre',CLASS_PRE_OPTIONS.concat(commitVals('class_pre')),prev.pre);setSelectFromValues('verClassMajor',CLASS_MAJOR_OPTIONS.concat(commitVals('class_major')),prev.major);setSelectFromValues('verClassMid',CLASS_MID_OPTIONS.concat(commitVals('class_mid')),prev.mid);setSelectFromValues('verClassMinor',(S.minorLabels||[]).concat(commitVals('class_minor')),prev.minor);setSelectFromValues('verClassWork',(S.workTypeLabels||[]).concat(commitVals('class_work_type')),prev.work);}
function syncDeptByAssignee(){const assignee=txt(gid('verAssignee')?.value||'');if(!assignee)return;const match=S.users.find(u=>txt(u&&u.name)===assignee&&txt(u&&u.role));if(match&&txt(match.role))ensureSelectOption(gid('verDept'),match.role);}
async function loadProjectClassOptions(){const pid=toInt(gid('verProjSel').value);S.minorLabels=[];S.workTypeLabels=[];if(!(pid>0)){refreshVersionFieldOptions();return}try{const r=await fetch('/api/projects/'+pid+'/minor-classes');const d=await j(r);if(r.ok&&Array.isArray(d.labels))S.minorLabels=d.labels;}catch(_){}try{const r=await fetch('/api/projects/'+pid+'/work-types');const d=await j(r);if(r.ok&&Array.isArray(d.labels))S.workTypeLabels=d.labels;}catch(_){}refreshVersionFieldOptions();}
async function loadUsers(){const tb=gid('userList');tb.innerHTML='<tr><td colspan="5">불러오는 중...</td></tr>';try{const r=await fetch('/api/users');const d=await j(r);if(!r.ok)throw new Error(err(d,r,'등록자 조회 실패'));S.users=Array.isArray(d)?d:[];tb.innerHTML=S.users.length?S.users.map(u=>'<tr><td>'+u.id+'</td><td>'+esc(u.name||'')+'</td><td>'+esc(u.email||'')+'</td><td>'+esc(u.role||'-')+'</td><td><button data-id="'+u.id+'" class="danger delUser">삭제</button></td></tr>').join(''):'<tr><td colspan="5">등록자가 없습니다.</td></tr>';const uopts=S.users.map(u=>'<option value="'+u.id+'">'+esc((u.name||'')+(u.role?' ('+u.role+')':''))+'</option>');setOpts(gid('projCreatedBy'),uopts,gid('projCreatedBy').value);setOpts(gid('verUserSel'),uopts,gid('verUserSel').value);refreshVersionFieldOptions();tb.querySelectorAll('.delUser').forEach(b=>b.onclick=async()=>{const id=toInt(b.dataset.id);if(!(id>0))return;if(!confirm('등록자를 삭제할까요?'))return;try{const rr=await fetch('/api/users/'+id,{method:'DELETE'});const dd=await j(rr);if(!rr.ok)throw new Error(err(dd,rr,'삭제 실패'));msg('userMsg','등록자 삭제됨','success');await loadUsers();}catch(e){msg('userMsg',e.message,'error')}});}catch(e){tb.innerHTML='<tr><td colspan="5">등록자 조회 실패</td></tr>';}}

async function loadProjects(){const tb=gid('projList');tb.innerHTML='<tr><td colspan="5">불러오는 중...</td></tr>';try{const r=await fetch('/api/projects');const d=await j(r);if(!r.ok)throw new Error(err(d,r,'프로젝트 조회 실패'));S.projects=Array.isArray(d)?d:[];tb.innerHTML=S.projects.length?S.projects.map(p=>'<tr><td>'+p.id+'</td><td>'+esc(p.name||'')+'</td><td>'+esc(p.code||'')+'</td><td>'+esc(p.created_by??'-')+'</td><td><button data-id="'+p.id+'" class="danger delProj">삭제</button></td></tr>').join(''):'<tr><td colspan="5">프로젝트가 없습니다.</td></tr>';const popts=S.projects.map(p=>'<option value="'+p.id+'">'+esc((p.name||'')+' ('+(p.code||'')+')')+'</option>');setOpts(gid('verProjSel'),popts,gid('verProjSel').value);tb.querySelectorAll('.delProj').forEach(b=>b.onclick=async()=>{const id=toInt(b.dataset.id);if(!(id>0))return;if(!confirm('프로젝트를 삭제할까요?'))return;try{const rr=await fetch('/api/projects/'+id,{method:'DELETE'});const dd=await j(rr);if(!(rr.ok||rr.status===204))throw new Error(err(dd,rr,'삭제 실패'));msg('projMsg','프로젝트 삭제됨','success');await loadProjects();}catch(e){msg('projMsg',e.message,'error')}});await loadCommits();}catch(e){tb.innerHTML='<tr><td colspan="5">프로젝트 조회 실패</td></tr>';}}

function sessOn(){return S.sess.id!=null&&S.sess.commitId!=null}function clearTimer(){if(S.sess.timer){clearInterval(S.sess.timer);S.sess.timer=null}}function resetSess(){clearTimer();S.sess.id=null;S.sess.commitId=null;S.sess.userId=null}
function status(t,kind){const e=gid('verStatus');e.textContent=t||'';e.style.color=kind==='error'?'#b91c1c':kind==='success'?'#166534':'#6b7280'}
function setFieldValue(id,value){const el=gid(id);if(!el)return;const v=txt(value);if(el.tagName==='SELECT'){if(!v){el.value='';return}ensureSelectOption(el,v);return}el.value=v;}
function fill(c){const w=gid('verEditWrap');const ids=['verLabel','verBranch','verAssignee','verDept','verClassPre','verClassMajor','verClassMid','verClassMinor','verClassWork','verNotes'];if(!c){w.style.display='none';ids.forEach(id=>setFieldValue(id,''));return}w.style.display='block';setFieldValue('verLabel',c.version_label);setFieldValue('verBranch',c.branch_name);setFieldValue('verAssignee',c.assignee_name);setFieldValue('verDept',c.assignee_department);setFieldValue('verClassPre',c.class_pre);setFieldValue('verClassMajor',c.class_major);setFieldValue('verClassMid',c.class_mid);setFieldValue('verClassMinor',c.class_minor);setFieldValue('verClassWork',c.class_work_type);setFieldValue('verNotes',c.change_notes)}
function body(){const assignee=txt(gid('verAssignee').value);let dept=txt(gid('verDept').value);if(assignee&&!dept){const match=S.users.find(u=>txt(u&&u.name)===assignee&&txt(u&&u.role));if(match)dept=txt(match.role)}return{version_label:txt(gid('verLabel').value)||null,branch_name:txt(gid('verBranch').value)||null,assignee_name:assignee||null,assignee_department:dept||null,class_pre:txt(gid('verClassPre').value)||null,class_major:txt(gid('verClassMajor').value)||null,class_mid:txt(gid('verClassMid').value)||null,class_minor:txt(gid('verClassMinor').value)||null,class_work_type:txt(gid('verClassWork').value)||null,change_notes:txt(gid('verNotes').value)||null}}
function refreshBtns(){const cid=toInt(gid('verCommitSel').value),uid=toInt(gid('verUserSel').value);const same=sessOn()&&cid===S.sess.commitId,owner=sessOn()&&uid===S.sess.userId;gid('verStartBtn').disabled=!(cid&&uid)|| (sessOn()&&!same);gid('verEndBtn').disabled=!(same&&owner);gid('verSaveBtn').disabled=!(same&&owner);gid('verDeleteBtn').disabled=!(same&&owner)}

async function loadCommitDetail(){const cid=toInt(gid('verCommitSel').value);if(!(cid>0)){fill(null);return}try{const r=await fetch('/api/commits/'+cid);const d=await j(r);if(!r.ok)throw new Error(err(d,r,'버전 조회 실패'));fill(d)}catch(e){fill(null);msg('verMsg',e.message,'error')}}
async function loadActive(){const cid=toInt(gid('verCommitSel').value);if(!(cid>0)){if(!sessOn())status('세션 없음','info');refreshBtns();return}try{const r=await fetch('/api/commits/'+cid+'/manage-sessions/active');const d=await j(r);if(!r.ok)throw new Error(err(d,r,'세션 조회 실패'));const s=d.session||null;if(!s){if(S.sess.commitId===cid)resetSess();status('세션 없음','info');refreshBtns();return}const uid=toInt(gid('verUserSel').value);const exp=s.lock_expires_at?new Date(s.lock_expires_at).toLocaleString('ko-KR'):'-';if(uid&&uid===s.editor_user_id){S.sess.id=s.id;S.sess.commitId=s.commit_id;S.sess.userId=s.editor_user_id;clearTimer();S.sess.timer=setInterval(()=>heartbeat().catch(()=>{}),30000);status('내 세션 활성 (만료 '+exp+')','success')}else{status('다른 사용자 잠금: ID '+s.editor_user_id+' / 만료 '+exp,'error')}}catch(_){status('세션 조회 실패','error')}refreshBtns()}
async function loadCommits(){const pid=toInt(gid('verProjSel').value);const sel=gid('verCommitSel');if(!(pid>0)){S.commits=[];S.minorLabels=[];S.workTypeLabels=[];refreshVersionFieldOptions();setOpts(sel,[],'');fill(null);status('세션 없음','info');refreshBtns();return}await loadProjectClassOptions();const prev=sel.value;try{const r=await fetch('/api/projects/'+pid+'/commits');const d=await j(r);if(!r.ok)throw new Error(err(d,r,'버전 목록 실패'));S.commits=Array.isArray(d.commits)?d.commits:[];refreshVersionFieldOptions();setOpts(sel,S.commits.map(c=>'<option value="'+c.id+'">#'+c.id+' '+esc(c.version_label||'-')+' / '+esc(c.status||'-')+'</option>'),prev);await loadCommitDetail();await loadActive()}catch(e){S.commits=[];refreshVersionFieldOptions();setOpts(sel,[],'');msg('verMsg',e.message,'error')}refreshBtns()}
async function heartbeat(){if(!sessOn())return;const uid=toInt(gid('verUserSel').value);if(!(uid>0)||uid!==S.sess.userId)return;try{const r=await fetch('/api/manage-sessions/'+S.sess.id+'/heartbeat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({editor_user_id:uid})});const d=await j(r);if(!r.ok)throw new Error(err(d,r,'세션 만료'));}catch(e){resetSess();status('세션 만료 또는 종료','error');msg('verMsg',e.message,'error')}refreshBtns()}

gid('refreshUsersBtn').onclick=async()=>{await loadUsers()};gid('refreshProjBtn').onclick=async()=>{await loadProjects()};gid('verRefreshBtn').onclick=async()=>{await loadUsers();await loadProjects();await loadCommits();await loadActive();refreshBtns()};
gid('addUserBtn').onclick=async()=>{const name=txt(gid('userName').value),email=txt(gid('userEmail').value),role=txt(gid('userRole').value)||null;if(!name||!email){msg('userMsg','이름/이메일을 입력하세요.','error');return}try{const r=await fetch('/api/users',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,email,role})});const d=await j(r);if(!r.ok)throw new Error(err(d,r,'등록자 추가 실패'));gid('userName').value='';gid('userEmail').value='';gid('userRole').value='';msg('userMsg','등록자 추가됨: ID '+d.id,'success');await loadUsers()}catch(e){msg('userMsg',e.message,'error')}};
gid('addProjBtn').onclick=async()=>{const name=txt(gid('projName').value),code=txt(gid('projCode').value),created=toInt(gid('projCreatedBy').value);if(!name||!code){msg('projMsg','이름/코드를 입력하세요.','error');return}const body={name,code};if(created!=null)body.created_by=created;try{const r=await fetch('/api/projects',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});const d=await j(r);if(!r.ok)throw new Error(err(d,r,'프로젝트 추가 실패'));gid('projName').value='';gid('projCode').value='';gid('projCreatedBy').value='';msg('projMsg','프로젝트 추가됨: ID '+d.id,'success');await loadProjects()}catch(e){msg('projMsg',e.message,'error')}};

gid('verProjSel').onchange=async()=>{await loadCommits()};gid('verCommitSel').onchange=async()=>{await loadCommitDetail();await loadActive();refreshBtns()};gid('verUserSel').onchange=async()=>{await loadActive();refreshBtns()};gid('verAssignee').onchange=()=>{syncDeptByAssignee()};
gid('verStartBtn').onclick=async()=>{const cid=toInt(gid('verCommitSel').value),uid=toInt(gid('verUserSel').value);if(!(cid>0)){msg('verMsg','버전을 선택하세요.','error');return}if(!(uid>0)){msg('verMsg','편집자를 선택하세요.','error');return}if(sessOn()&&S.sess.commitId!==cid){msg('verMsg','다른 세션이 활성화되어 있습니다.','error');return}try{const r=await fetch('/api/commits/'+cid+'/manage-sessions/start',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({editor_user_id:uid})});const d=await j(r);if(!r.ok){if(r.status===409){const lk=d?.detail?.lock_info||{};throw new Error('잠금 중: '+(lk.editor_name||('ID '+lk.editor_user_id)))}throw new Error(err(d,r,'세션 시작 실패'))}S.sess.id=d.session.id;S.sess.commitId=d.session.commit_id;S.sess.userId=d.session.editor_user_id;clearTimer();S.sess.timer=setInterval(()=>heartbeat().catch(()=>{}),30000);status('세션 시작됨','success');msg('verMsg',d.resumed?'세션 재개됨.':'세션 시작됨.','success')}catch(e){msg('verMsg',e.message,'error')}refreshBtns()};
gid('verEndBtn').onclick=async()=>{if(!sessOn()){msg('verMsg','종료할 세션이 없습니다.','info');return}const uid=toInt(gid('verUserSel').value);if(!(uid>0)){msg('verMsg','편집자를 선택하세요.','error');return}try{const r=await fetch('/api/manage-sessions/'+S.sess.id+'/end',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({editor_user_id:uid})});const d=await j(r);if(!r.ok)throw new Error(err(d,r,'세션 종료 실패'));resetSess();status('세션 종료','info');msg('verMsg','세션 종료됨.','success')}catch(e){msg('verMsg',e.message,'error')}refreshBtns()};
gid('verSaveBtn').onclick=async()=>{if(!sessOn()){msg('verMsg','먼저 세션을 시작하세요.','error');return}const uid=toInt(gid('verUserSel').value),cid=toInt(gid('verCommitSel').value);if(!(cid>0)||cid!==S.sess.commitId){msg('verMsg','선택 버전이 세션과 다릅니다.','error');return}if(!(uid>0)){msg('verMsg','편집자를 선택하세요.','error');return}try{const r=await fetch('/api/manage-sessions/'+S.sess.id+'/commit?editor_user_id='+uid,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify(body())});const d=await j(r);if(!r.ok)throw new Error(err(d,r,'저장 실패'));fill(d);msg('verMsg','버전 내용 저장됨.','success');await loadCommits()}catch(e){msg('verMsg',e.message,'error')}refreshBtns()};
gid('verDeleteBtn').onclick=async()=>{if(!sessOn()){msg('verMsg','먼저 세션을 시작하세요.','error');return}const uid=toInt(gid('verUserSel').value),cid=toInt(gid('verCommitSel').value);if(!(cid>0)||cid!==S.sess.commitId){msg('verMsg','선택 버전이 세션과 다릅니다.','error');return}if(!(uid>0)){msg('verMsg','편집자를 선택하세요.','error');return}if(!confirm('선택한 버전을 삭제할까요? 되돌릴 수 없습니다.'))return;try{const r=await fetch('/api/manage-sessions/'+S.sess.id+'/commit?editor_user_id='+uid,{method:'DELETE'});const d=await j(r);if(!r.ok)throw new Error(err(d,r,'버전 삭제 실패'));resetSess();status('세션 없음','info');fill(null);msg('verMsg','버전 삭제됨.','success');await loadCommits()}catch(e){msg('verMsg',e.message,'error')}refreshBtns()};

gid('resetAllBtn').onclick=async()=>{if(!confirm('정말로 모든 데이터를 삭제할까요? 되돌릴 수 없습니다.'))return;try{const r=await fetch('/api/admin/reset-all',{method:'POST',headers:{'Accept':'application/json'}});const d=await j(r);if(!r.ok)throw new Error(err(d,r,'초기화 실패'));msg('resetMsg','초기화 완료. 페이지를 새로고침합니다.','success');setTimeout(()=>location.reload(),1200)}catch(e){msg('resetMsg',e.message,'error')}};

(async()=>{await loadUsers();await loadProjects();await loadCommits();status('세션 없음','info');refreshBtns()})();
</script>
</body>
</html>
