version: "3.9"

services:
  postgis:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: caduser
      POSTGRES_PASSWORD: cadpass
      POSTGRES_DB: cadmanage
    ports:
      - "5432:5432"
    volumes:
      - postgis_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U caduser -d cadmanage"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://caduser:cadpass@postgis:5432/cadmanage
      UPLOAD_ROOT: /app/data/uploads
      DEV_ALLOW_DXF_UPLOAD: "true"
      # ODA_FC_PATH: ""  # DWG 변환 시 설정
    volumes:
      - ./data:/app/data
    depends_on:
      postgis:
        condition: service_healthy

volumes:
  postgis_data:
